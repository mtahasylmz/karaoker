<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>annemusic — karaoke-ify any music video</title>
  <style>
    :root {
      --bg: #0b0d10;
      --panel: #141821;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --accent: #ffd60a;
      --ok: #34d399;
      --err: #f87171;
      --border: #242a33;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 2rem 1rem; min-height: 100vh;
      background: var(--bg); color: var(--text);
      font: 16px/1.5 ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      display: flex; justify-content: center;
    }
    main { width: 100%; max-width: 640px; }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; }
    p.subtitle { margin: 0 0 2rem; color: var(--muted); }
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem;
    }
    label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 0.35rem; }
    input[type=text], input[type=file] {
      width: 100%; padding: 0.7rem 0.85rem; border-radius: 8px;
      background: #0b0d10; border: 1px solid var(--border); color: var(--text);
      font-size: 1rem;
    }
    input[type=file] { padding: 0.55rem 0.65rem; }
    input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    button {
      margin-top: 0.75rem; padding: 0.7rem 1.2rem; border-radius: 8px;
      background: var(--accent); color: #111; border: none; font-weight: 600;
      font-size: 1rem; cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 1rem; }
    .pill {
      display: inline-block; padding: 0.2rem 0.55rem; border-radius: 999px;
      background: #1f2633; font-size: 0.8rem; color: var(--muted);
    }
    .status { margin-top: 0.75rem; font-size: 0.95rem; }
    .status.done { color: var(--ok); }
    .status.failed { color: var(--err); }
    video { width: 100%; border-radius: 8px; margin-top: 0.75rem; background: #000; }
    ul.jobs { list-style: none; padding: 0; margin: 0; }
    ul.jobs li {
      padding: 0.5rem 0; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; gap: 0.5rem; align-items: center;
    }
    ul.jobs li:last-child { border-bottom: none; }
    ul.jobs a { color: var(--accent); text-decoration: none; font-size: 0.9rem; }
    .small { font-size: 0.85rem; color: var(--muted); }
    .hidden { display: none; }
    .progress {
      height: 6px; background: #1f2633; border-radius: 3px; overflow: hidden;
      margin-top: 0.5rem;
    }
    .progress > div {
      height: 100%; background: var(--accent); width: 0%;
      transition: width 0.15s ease;
    }
  </style>
</head>
<body>
<main>
  <h1>annemusic 🎤</h1>
  <p class="subtitle">Upload a music video, get it back with karaoke lyrics burned in.</p>

  <section id="register" class="panel hidden">
    <label for="username">Pick a username (2–24 chars, letters/digits)</label>
    <input id="username" type="text" autocomplete="off" placeholder="e.g. taha">
    <button id="register-btn">Continue</button>
    <div class="status" id="register-err"></div>
  </section>

  <section id="app" class="panel hidden">
    <div class="row">
      <span>Signed in as <strong id="me"></strong></span>
      <button class="pill" id="logout" style="background:transparent;color:var(--muted);border:1px solid var(--border);">switch user</button>
    </div>
  </section>

  <section id="submit" class="panel hidden">
    <label for="file">Pick a music video (mp4, mov, webm, mkv — up to 500 MB)</label>
    <input id="file" type="file" accept="video/mp4,video/quicktime,video/webm,video/x-matroska">
    <button id="submit-btn">Karaoke it</button>
    <div class="status" id="job-status"></div>
    <div class="progress hidden" id="hash-progress-bar"><div></div></div>
    <div class="progress hidden" id="upload-progress-bar"><div></div></div>
    <video id="player" class="hidden" controls playsinline></video>
  </section>

  <section id="history" class="panel hidden">
    <div class="small" style="margin-bottom:0.5rem;">Recent karaokes</div>
    <ul class="jobs" id="jobs-list"></ul>
  </section>
</main>

<script>
const API_URL = (localStorage.getItem("annemusic.api_url") || "https://api-ckozypd55a-uc.a.run.app").replace(/\/$/, "");
const MAX_BYTES = 500 * 1024 * 1024;

const $ = (id) => document.getElementById(id);
const show = (id) => $(id).classList.remove("hidden");
const hide = (id) => $(id).classList.add("hidden");
const setProgress = (id, pct) => {
  const bar = $(id);
  bar.classList.toggle("hidden", pct == null);
  if (pct != null) bar.firstElementChild.style.width = Math.round(pct * 100) + "%";
};

async function api(path, opts = {}) {
  const res = await fetch(API_URL + path, {
    ...opts,
    headers: { "content-type": "application/json", ...(opts.headers || {}) },
  });
  const text = await res.text();
  const data = text ? JSON.parse(text) : null;
  if (!res.ok) throw new Error(data?.detail || res.statusText);
  return data;
}

function currentUser() { return localStorage.getItem("annemusic.username"); }
function setUser(u) { localStorage.setItem("annemusic.username", u); }
function clearUser() { localStorage.removeItem("annemusic.username"); }

async function boot() {
  const u = currentUser();
  if (!u) { show("register"); return; }
  try { await api(`/users/${encodeURIComponent(u)}`); }
  catch { clearUser(); show("register"); return; }
  $("me").textContent = u;
  show("app"); show("submit"); show("history");
  refreshHistory();
}

$("register-btn").onclick = async () => {
  const u = $("username").value.trim();
  $("register-err").textContent = "";
  if (!u) return;
  try {
    await api("/users", { method: "POST", body: JSON.stringify({ username: u }) });
    setUser(u);
    hide("register");
    boot();
  } catch (e) {
    $("register-err").textContent = e.message;
    $("register-err").className = "status failed";
  }
};

$("logout").onclick = () => { clearUser(); location.reload(); };

/** Stream-hash a File in ~4MB chunks so we don't OOM on big files. */
async function sha256File(file, onProgress) {
  // Web Crypto doesn't support streaming SHA-256, so we buffer the whole file
  // into one ArrayBuffer. For our 500MB cap that's fine on desktop; a real
  // production build would do chunked hashing with a JS implementation.
  const chunkSize = 4 * 1024 * 1024;
  const chunks = [];
  let read = 0;
  for (let offset = 0; offset < file.size; offset += chunkSize) {
    const chunk = await file.slice(offset, offset + chunkSize).arrayBuffer();
    chunks.push(new Uint8Array(chunk));
    read += chunk.byteLength;
    onProgress?.(read / file.size);
  }
  const total = chunks.reduce((n, c) => n + c.length, 0);
  const buf = new Uint8Array(total);
  let pos = 0;
  for (const c of chunks) { buf.set(c, pos); pos += c.length; }
  const digest = await crypto.subtle.digest("SHA-256", buf);
  return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, "0")).join("");
}

function putWithProgress(url, file, contentType, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("PUT", url, true);
    xhr.setRequestHeader("Content-Type", contentType);
    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) onProgress(e.loaded / e.total);
    };
    xhr.onload = () => (xhr.status >= 200 && xhr.status < 300 ? resolve() : reject(new Error(`PUT ${xhr.status}: ${xhr.responseText.slice(0, 200)}`)));
    xhr.onerror = () => reject(new Error("PUT network error"));
    xhr.send(file);
  });
}

$("submit-btn").onclick = async () => {
  const file = $("file").files[0];
  if (!file) return;
  if (file.size > MAX_BYTES) {
    $("job-status").textContent = `File too big (${(file.size / 1024 / 1024).toFixed(0)} MB, max 500)`;
    $("job-status").className = "status failed";
    return;
  }

  $("submit-btn").disabled = true;
  $("player").classList.add("hidden");
  setProgress("hash-progress-bar", null);
  setProgress("upload-progress-bar", null);
  $("job-status").textContent = "Hashing file…";
  $("job-status").className = "status";

  try {
    const sha256 = await sha256File(file, (p) => setProgress("hash-progress-bar", p));
    setProgress("hash-progress-bar", null);

    $("job-status").textContent = "Checking cache…";
    const uploadRes = await api("/uploads", {
      method: "POST",
      body: JSON.stringify({
        username: currentUser(),
        sha256,
        size: file.size,
        content_type: file.type,
      }),
    });

    if (uploadRes.cached && uploadRes.status === "done" && uploadRes.video_url) {
      showVideo(uploadRes.video_url, true);
      refreshHistory();
      return;
    }

    if (uploadRes.need_upload) {
      $("job-status").textContent = "Uploading…";
      await putWithProgress(uploadRes.signed_put_url, file, file.type, (p) => setProgress("upload-progress-bar", p));
      setProgress("upload-progress-bar", null);
    }

    $("job-status").textContent = "Queuing karaoke job…";
    const jobRes = await api("/jobs", {
      method: "POST",
      body: JSON.stringify({ username: currentUser(), sha256 }),
    });
    if (jobRes.status === "done" && jobRes.video_url) {
      showVideo(jobRes.video_url, true);
    } else {
      pollJob(jobRes.job_id);
    }
    refreshHistory();
  } catch (e) {
    $("job-status").textContent = e.message;
    $("job-status").className = "status failed";
    setProgress("hash-progress-bar", null);
    setProgress("upload-progress-bar", null);
  } finally {
    $("submit-btn").disabled = false;
  }
};

const PRETTY = {
  queued: "Queued…", downloading: "Fetching source…",
  separating: "Separating vocals…", transcribing: "Transcribing lyrics…",
  rendering: "Rendering karaoke…", uploading: "Uploading result…",
  done: "Done ✅", failed: "Failed",
};

async function pollJob(jobId) {
  for (let i = 0; i < 600; i++) {
    let job;
    try { job = await api(`/jobs/${jobId}`); } catch (e) {
      $("job-status").textContent = e.message;
      $("job-status").className = "status failed";
      return;
    }
    const label = PRETTY[job.status] || job.status;
    $("job-status").textContent = label + (job.error ? ` — ${job.error}` : "");
    $("job-status").className = "status " + (job.status === "done" ? "done" : job.status === "failed" ? "failed" : "");
    if (job.status === "done") { showVideo(job.video_url, false); refreshHistory(); return; }
    if (job.status === "failed") { refreshHistory(); return; }
    await new Promise((r) => setTimeout(r, 3000));
  }
}

function showVideo(url, cached) {
  const v = $("player");
  v.src = url;
  v.classList.remove("hidden");
  v.play().catch(() => {});
  $("job-status").textContent = cached ? "Done ✅ (served from cache)" : "Done ✅";
  $("job-status").className = "status done";
}

async function refreshHistory() {
  try {
    const { jobs } = await api(`/users/${encodeURIComponent(currentUser())}/jobs`);
    const ul = $("jobs-list");
    ul.innerHTML = "";
    jobs.slice(0, 10).forEach((j) => {
      const li = document.createElement("li");
      const status = document.createElement("span");
      const hash = (j.sha256 || "").slice(0, 12);
      status.textContent = (hash || j.job_id) + " — " + (PRETTY[j.status] || j.status);
      const a = document.createElement("a");
      if (j.status === "done" && j.video_url) {
        a.href = "#"; a.textContent = "play";
        a.onclick = (e) => { e.preventDefault(); showVideo(j.video_url, true); };
      } else {
        a.textContent = "";
      }
      li.append(status, a);
      ul.append(li);
    });
  } catch { /* ignore */ }
}

boot();
</script>
</body>
</html>
