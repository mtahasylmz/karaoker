<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>annemusic — lyric overlay sketch</title>
<style>
  :root {
    --bg: #0b0b10;
    --sung: #ffd54a;
    --unsung: #ffffff;
    --stroke: rgba(0, 0, 0, 0.85);
    --font: "Inter", system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
  }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--unsung); font-family: var(--font); overflow: hidden; }
  .stage { position: fixed; inset: 0; display: grid; grid-template-rows: 1fr auto; }

  /* background video — pixels are atmosphere, not anchor */
  video {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; opacity: 0.4;
    filter: saturate(1.2) brightness(0.55);
  }

  .lyrics-wrap { position: relative; overflow: hidden; min-height: 0; }
  .lyrics {
    position: absolute; inset: 0; overflow: hidden;
    mask-image: linear-gradient(to bottom, transparent 0, #000 18%, #000 82%, transparent 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 18%, #000 82%, transparent 100%);
  }
  #boot-error {
    position: fixed; inset: 0; display: none; place-items: center;
    padding: 24px; background: #1a0b0b; color: #ffb4b4;
    font-family: ui-monospace, Menlo, monospace; font-size: 13px;
    white-space: pre-wrap; z-index: 10;
  }
  .col {
    display: flex; flex-direction: column; gap: 0.65em;
    padding: 38vh 6vw 60vh;
    transition: transform 560ms cubic-bezier(.22,.61,.36,1);
    will-change: transform;
  }
  .line {
    font-weight: 800;
    font-size: clamp(26px, 4.2vw, 64px);
    line-height: 1.12;
    letter-spacing: -0.015em;
    cursor: pointer;
    transform-origin: left center;
    transform: scale(var(--scale, 1));
    opacity: var(--op, 0.35);
    filter: blur(var(--blur, 0px));
    transition: transform 380ms cubic-bezier(.22,.61,.36,1), opacity 380ms ease, filter 380ms ease;
    will-change: transform, opacity, filter;
  }
  .word {
    position: relative;
    display: inline-block;
    margin-right: 0.28em;
    /* stroke under fill — crisper than four-way text-shadow */
    -webkit-text-stroke: 2px var(--stroke);
    paint-order: stroke fill;
  }
  .word .base { color: var(--unsung); }
  .word .sung {
    position: absolute; inset: 0;
    color: var(--sung);
    /* the sweep: we animate --p imperatively in rAF */
    clip-path: inset(0 calc((1 - var(--p, 0)) * 100%) 0 0);
    -webkit-text-stroke: 2px var(--stroke);
    paint-order: stroke fill;
  }

  /* interlude dots — Apple Music's tell */
  .dots {
    display: inline-flex; gap: 0.55em; align-items: center;
    height: 1em; padding: 0.2em 0; opacity: 0;
    transition: opacity 250ms ease;
  }
  .dots[data-visible="true"] { opacity: 1; }
  .dot {
    width: 0.55em; height: 0.55em; border-radius: 50%;
    background: var(--unsung);
    animation: pulse 1200ms ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 180ms; }
  .dot:nth-child(3) { animation-delay: 360ms; }
  .dots[data-soon="true"] .dot { animation-duration: 420ms; }
  @keyframes pulse {
    0%, 100% { transform: scale(0.7); opacity: 0.35; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  .controls {
    position: relative; z-index: 5;
    padding: 12px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), rgba(0,0,0,0.3));
    display: flex; gap: 12px; align-items: center; color: #ddd; font-size: 13px;
    flex-wrap: wrap;
  }
  .controls label { display: inline-flex; gap: 6px; align-items: center; }
  .controls audio { flex: 1; min-width: 220px; }
  .controls input[type="file"] { color: #ccc; max-width: 220px; }

  @media (prefers-reduced-motion: reduce) {
    .line, .col, .word .sung { transition: none !important; }
    .dot { animation: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<pre id="boot-error"></pre>
<script>
  // Surface any module-load failure to the page so file:// debugging doesn't
  // require opening DevTools. Most likely cause of "nothing shows up" is an
  // esm.sh fetch being blocked (offline, VPN, strict extension).
  window.addEventListener("error", (e) => {
    const el = document.getElementById("boot-error");
    el.style.display = "grid";
    el.textContent = "Boot error:\n" + (e.error?.stack || e.message || String(e));
  });
  window.addEventListener("unhandledrejection", (e) => {
    const el = document.getElementById("boot-error");
    el.style.display = "grid";
    el.textContent = "Unhandled rejection:\n" + (e.reason?.stack || e.reason || String(e));
  });
</script>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18",
    "react-dom/client": "https://esm.sh/react-dom@18/client",
    "htm": "https://esm.sh/htm@3"
  }
}
</script>

<script type="module">
import React, { useRef, useEffect, useMemo } from "react";
import { createRoot } from "react-dom/client";
import htm from "htm";
const html = htm.bind(React.createElement);

// -------------------------------------------------------------------------
// SAMPLE DATA
// Shape is exactly `ComposeRequest.words[]` from packages/contracts.
// In production this comes from the compose stage's manifest.json.
// -------------------------------------------------------------------------
const WORDS = [
  {text:"We're",       start: 2.0,  end: 2.3},
  {text:"no",          start: 2.3,  end: 2.5},
  {text:"strangers",   start: 2.5,  end: 3.2},
  {text:"to",          start: 3.2,  end: 3.4},
  {text:"love",        start: 3.4,  end: 4.0},

  {text:"You",         start: 5.0,  end: 5.2},
  {text:"know",        start: 5.2,  end: 5.5},
  {text:"the",         start: 5.5,  end: 5.7},
  {text:"rules",       start: 5.7,  end: 6.1},
  {text:"and",         start: 6.1,  end: 6.3},
  {text:"so",          start: 6.3,  end: 6.5},
  {text:"do",          start: 6.5,  end: 6.7},
  {text:"I",           start: 6.7,  end: 7.2},

  // deliberate ~5s gap to trigger interlude dots
  {text:"A",           start: 12.0, end: 12.2},
  {text:"full",        start: 12.2, end: 12.6},
  {text:"commitment's",start: 12.6, end: 13.4},
  {text:"what",        start: 13.4, end: 13.7},
  {text:"I'm",         start: 13.7, end: 13.9},
  {text:"thinking",    start: 13.9, end: 14.3},
  {text:"of",          start: 14.3, end: 14.8},

  {text:"You",         start: 15.5, end: 15.7},
  {text:"wouldn't",    start: 15.7, end: 16.1},
  {text:"get",         start: 16.1, end: 16.3},
  {text:"this",        start: 16.3, end: 16.6},
  {text:"from",        start: 16.6, end: 16.8},
  {text:"any",         start: 16.8, end: 17.1},
  {text:"other",       start: 17.1, end: 17.4},
  {text:"guy",         start: 17.4, end: 18.2},
];

// Mirrors stages/compose/src/ass.ts:groupLines. Keeping this in sync with the
// compose stage is the whole point of the data-model upgrade we discussed —
// the stage would emit this tree directly in the manifest.
function groupLines(words, { breakGap = 1.5, maxWords = 8 } = {}) {
  const lines = [];
  let cur = [];
  for (const w of words) {
    if (cur.length) {
      const prev = cur[cur.length - 1];
      if (w.start - prev.end > breakGap || cur.length >= maxWords) {
        lines.push(cur); cur = [];
      }
    }
    cur.push(w);
  }
  if (cur.length) lines.push(cur);
  return lines.map((ws, i) => ({
    id: i,
    start: ws[0].start,
    end:   ws[ws.length - 1].end,
    words: ws,
  }));
}

const INTERLUDE_GAP   = 4.0;  // seconds of silence before dots appear
const LEAD_IN         = 0.3;  // activate a line this early
const TAIL            = 0.4;  // keep a line "active" this long after its last word
const ACTIVE_VH_RATIO = 0.40; // active line parks here in the viewport

// -------------------------------------------------------------------------
// <LyricOverlay> — idiomatic React structure, imperative per-frame updates.
//
// Rationale: re-rendering 20+ lines at 60 Hz via setState works, but wastes
// reconciler time. The production pattern is:
//   - React owns structure (lines/words → DOM)
//   - refs hold per-element handles
//   - one rAF loop reads audio.currentTime and writes CSS custom properties
//   - CSS transitions smooth the imperative writes
// That's why you see zero useState() for the hot path.
// -------------------------------------------------------------------------
function LyricOverlay({ words, audioRef, videoRef }) {
  const lines = useMemo(() => groupLines(words), [words]);

  const colRef    = useRef(null);
  const wrapRef   = useRef(null);
  const lineRefs  = useRef([]);
  const wordRefs  = useRef([]);   // wordRefs.current[lineIdx][wordIdx]
  const dotsRef   = useRef(null);
  const lastActive = useRef(-2);
  const colYRef   = useRef(0);

  useEffect(() => {
    lineRefs.current = lineRefs.current.slice(0, lines.length);
    wordRefs.current = wordRefs.current.slice(0, lines.length);
  }, [lines]);

  // Loose-couple video to audio. Audio is the single source of truth.
  useEffect(() => {
    const a = audioRef.current, v = videoRef.current;
    if (!a || !v) return;
    const onPlay    = () => v.play().catch(() => {});
    const onPause   = () => v.pause();
    const onSeeking = () => { v.currentTime = a.currentTime; };
    a.addEventListener("play",    onPlay);
    a.addEventListener("pause",   onPause);
    a.addEventListener("seeking", onSeeking);
    const driftId = setInterval(() => {
      if (!a.paused && Math.abs(v.currentTime - a.currentTime) > 0.15) {
        v.currentTime = a.currentTime;
      }
    }, 1000);
    return () => {
      a.removeEventListener("play",    onPlay);
      a.removeEventListener("pause",   onPause);
      a.removeEventListener("seeking", onSeeking);
      clearInterval(driftId);
    };
  }, [audioRef, videoRef]);

  // Per-frame loop — the only hot path in this file.
  useEffect(() => {
    const a = audioRef.current;
    if (!a) return;
    let raf = 0;

    const tick = () => {
      const t = a.currentTime;

      // 1) which line is "active" now
      let active = -1;
      for (let i = 0; i < lines.length; i++) {
        if (t >= lines[i].start - LEAD_IN && t <= lines[i].end + TAIL) { active = i; break; }
      }
      if (active === -1) {
        for (let i = 0; i < lines.length; i++) {
          if (lines[i].start > t) { active = i; break; }
        }
        if (active === -1) active = lines.length - 1;
      }

      // 2) scale / opacity / blur per line — driven by distance to active
      for (let i = 0; i < lines.length; i++) {
        const el = lineRefs.current[i]; if (!el) continue;
        const d = Math.abs(i - active);
        const scale = d === 0 ? 1.06 : 1;
        const op    = d === 0 ? 1    : Math.max(0.18, 0.55 - d * 0.12);
        const blur  = d === 0 ? 0    : Math.min(6, d * 1.3);
        el.style.setProperty("--scale", scale);
        el.style.setProperty("--op",    op);
        el.style.setProperty("--blur",  blur + "px");
      }

      // 3) per-word fill (only the active line matters visually)
      if (active >= 0 && active < lines.length) {
        const line = lines[active];
        const els  = wordRefs.current[active] || [];
        for (let k = 0; k < line.words.length; k++) {
          const w = line.words[k];
          const el = els[k]; if (!el) continue;
          let p;
          if (t < w.start)      p = 0;
          else if (t > w.end)   p = 1;
          else                  p = (t - w.start) / Math.max(1e-3, w.end - w.start);
          el.style.setProperty("--p", p);
        }
      }

      // 4) interlude dots — show between lines whose gap exceeds threshold
      const dots = dotsRef.current;
      if (dots) {
        let show = false, afterIdx = -1, timeToNext = Infinity;
        for (let i = 0; i < lines.length - 1; i++) {
          const gap = lines[i + 1].start - lines[i].end;
          if (gap > INTERLUDE_GAP && t > lines[i].end && t < lines[i + 1].start - 0.25) {
            show = true; afterIdx = i; timeToNext = lines[i + 1].start - t; break;
          }
        }
        dots.dataset.visible = show ? "true" : "false";
        dots.dataset.soon    = show && timeToNext < 0.8 ? "true" : "false";
        if (show) {
          const after = lineRefs.current[afterIdx];
          if (after && dots.previousElementSibling !== after) {
            after.insertAdjacentElement("afterend", dots);
          }
        }
      }

      // 5) auto-center the active line at ACTIVE_VH_RATIO of the viewport.
      // Only recompute the translate when the active line changes — avoids
      // fighting the CSS transition.
      if (active !== lastActive.current && active >= 0) {
        const el = lineRefs.current[active];
        const wrap = wrapRef.current;
        const col  = colRef.current;
        if (el && wrap && col) {
          const elRect = el.getBoundingClientRect();
          const wrapRect = wrap.getBoundingClientRect();
          const centerNow = (elRect.top - wrapRect.top) + elRect.height / 2;
          const target = wrapRect.height * ACTIVE_VH_RATIO;
          const delta = target - centerNow;
          const next = colYRef.current + delta;
          colYRef.current = next;
          col.style.transform = `translateY(${next}px)`;
        }
        lastActive.current = active;
      }

      raf = requestAnimationFrame(tick);
    };

    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [lines, audioRef]);

  const seek = (t) => {
    const a = audioRef.current; if (!a) return;
    a.currentTime = t;
    a.play().catch(() => {});
  };

  return html`
    <div className="lyrics" ref=${wrapRef}>
      <div className="col" ref=${colRef}>
        ${lines.map((line, i) => html`
          <div
            className="line"
            key=${line.id}
            ref=${(el) => { lineRefs.current[i] = el; }}
            onClick=${() => seek(line.start)}
          >
            ${line.words.map((w, k) => html`
              <span
                className="word"
                key=${k}
                ref=${(el) => {
                  (wordRefs.current[i] ||= [])[k] = el;
                }}
              >
                <span className="base">${w.text}</span>
                <span className="sung" aria-hidden="true">${w.text}</span>
              </span>
            `)}
          </div>
        `)}
        <div className="dots" ref=${dotsRef} aria-hidden="true">
          <span className="dot"></span><span className="dot"></span><span className="dot"></span>
        </div>
      </div>
    </div>
  `;
}

// -------------------------------------------------------------------------
// <App> — host element with the audio+video media elements and file pickers.
// In production apps/web this shell is replaced by whatever page component
// receives the compose-stage manifest.
// -------------------------------------------------------------------------
function App() {
  const audioRef = useRef(null);
  const videoRef = useRef(null);

  const onAudioFile = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    audioRef.current.src = URL.createObjectURL(f);
  };
  const onVideoFile = (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    videoRef.current.src = URL.createObjectURL(f);
  };

  return html`
    <div className="stage">
      <div className="lyrics-wrap">
        <video ref=${videoRef} playsInline muted loop></video>
        <${LyricOverlay} words=${WORDS} audioRef=${audioRef} videoRef=${videoRef} />
      </div>
      <div className="controls">
        <label>audio (instrumental): <input type="file" accept="audio/*" onChange=${onAudioFile} /></label>
        <label>video (optional bg): <input type="file" accept="video/*" onChange=${onVideoFile} /></label>
        <audio ref=${audioRef} controls></audio>
      </div>
    </div>
  `;
}

createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
